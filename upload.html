<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — MANI Research</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@400;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--void:#03040A;--deep:#06080F;--surface:#0A0D18;--raised:#0E1220;--hover:#131728;--card:#0C1020;--g1:#00FFB2;--g2:#00D4FF;--p1:#9B6DFF;--pk:#FF6B9D;--am:#FFBE0B;--bl:#60C8FF;--t1:#F0F2FA;--t2:#8B96B0;--t3:#3D4A6B;--ti:#03040A;--b1:rgba(255,255,255,0.04);--b2:rgba(255,255,255,0.08);--b3:rgba(255,255,255,0.14);--b4:rgba(255,255,255,0.22);--fd:'Outfit',sans-serif;--fb:'Space Grotesk',sans-serif;--fm:'JetBrains Mono',monospace;--nav:62px;--sb:218px;--rp:276px;--r1:6px;--r2:10px;--r3:14px;--r4:20px;--r5:28px;}

    .admin-layout { display:grid; grid-template-columns:200px 1fr; min-height:calc(100vh - var(--nav)); }
    .admin-nav { border-right:1px solid var(--b1); padding:20px 12px; position:sticky; top:var(--nav); height:calc(100vh - var(--nav)); }
    .admin-content { padding:28px 32px; }
    .admin-nav-item { display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:var(--r2); font-size:13px; color:var(--t2); cursor:pointer; transition:all 0.15s; margin-bottom:2px; }
    .admin-nav-item:hover { color:var(--t1); background:var(--raised); }
    .admin-nav-item.active { color:var(--g1); background:rgba(0,255,178,0.08); font-weight:500; }
    .admin-panel { display:none; }
    .admin-panel.active { display:block; }
    .panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
    .panel-title { font-family:var(--fd); font-size:22px; font-weight:800; }
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:14px; margin-bottom:28px; }
    .stat-card { background:var(--raised); border:1px solid var(--b1); border-radius:var(--r3); padding:18px; }
    .stat-card-num { font-family:var(--fd); font-size:28px; font-weight:800; margin-bottom:4px; }
    .stat-card-lbl { font-size:12px; color:var(--t3); }
    .stat-card-sub { font-size:11px; margin-top:6px; }
    .data-table { width:100%; border-collapse:collapse; }
    .data-table th { text-align:left; font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--t3); padding:10px 14px; border-bottom:1px solid var(--b1); }
    .data-table td { padding:12px 14px; border-bottom:1px solid var(--b1); font-size:13px; color:var(--t2); vertical-align:middle; }
    .data-table tr:hover td { background:var(--raised); }
    .data-table td:first-child { color:var(--t1); font-weight:500; }
    .table-wrap { background:var(--card); border:1px solid var(--b1); border-radius:var(--r3); overflow:hidden; }
    .table-filters { display:flex; gap:10px; align-items:center; padding:14px 16px; border-bottom:1px solid var(--b1); flex-wrap:wrap; }
    .filter-input { background:var(--void); border:1px solid var(--b2); border-radius:var(--r2); padding:7px 12px; color:var(--t1); font-family:var(--fb); font-size:13px; outline:none; }
    .filter-input:focus { border-color:var(--g1); }
    .action-menu { display:flex; gap:6px; }
    .act-btn { background:none; border:1px solid var(--b2); color:var(--t2); font-size:11px; padding:4px 10px; border-radius:999px; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
    .act-btn:hover { border-color:var(--g1); color:var(--g1); }
    .act-btn.danger:hover { border-color:var(--pk); color:var(--pk); }
    .act-btn.success:hover { border-color:var(--g1); color:var(--g1); }
    .pagination { display:flex; align-items:center; gap:8px; padding:14px 16px; justify-content:space-between; border-top:1px solid var(--b1); font-size:13px; color:var(--t3); }
    .page-btn { background:none; border:1px solid var(--b2); color:var(--t2); padding:5px 12px; border-radius:var(--r1); cursor:pointer; font-size:12px; transition:all 0.15s; }
    .page-btn:hover { border-color:var(--g1); color:var(--g1); }
    .page-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .assign-modal { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); z-index:200; display:none; align-items:center; justify-content:center; padding:20px; }
    .assign-modal.open { display:flex; }
    .assign-card { background:var(--raised); border:1px solid var(--b2); border-radius:var(--r4); padding:28px; width:100%; max-width:480px; animation:slideUp 0.25s var(--ease); }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
    .dept-bar { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
    .dept-bar-item { font-size:11px; background:var(--hover); border-radius:var(--r1); padding:4px 10px; }
  
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 10% -10%,rgba(0,255,178,0.05) 0%,transparent 55%),radial-gradient(ellipse 60% 50% at 90% 110%,rgba(155,109,255,0.06) 0%,transparent 55%);}

</style>
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="nav-brand">
    <div class="logo-mark">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="14" stroke="#4FFFB0" stroke-width="1.5"/>
        <circle cx="16" cy="16" r="3" fill="#4FFFB0"/>
        <line x1="16" y1="2" x2="16" y2="8" stroke="#4FFFB0" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="16" y1="24" x2="16" y2="30" stroke="#4FFFB0" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="2" y1="16" x2="8" y2="16" stroke="#4FFFB0" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="24" y1="16" x2="30" y2="16" stroke="#4FFFB0" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="brand-text">
      <span class="brand-name">MANI</span>
      <span class="brand-tagline">Admin Dashboard</span>
    </div>
  </a>
  <div class="nav-actions" style="margin-left:auto;">
    <a href="../index.html" class="btn-ghost-lg" style="font-size:13px;">← Back to Site</a>
  </div>
</nav>

<div style="padding-top:var(--nav);">
  <div class="admin-layout">
    <!-- Admin Sidebar -->
    <div class="admin-nav">
      <p class="sidebar-label" style="padding:0 8px;margin-bottom:8px;">Dashboard</p>
      <div class="admin-nav-item active" onclick="switchPanel('overview',this)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Overview
      </div>
      <div class="admin-nav-item" onclick="switchPanel('papers',this)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Papers
      </div>
      <div class="admin-nav-item" onclick="switchPanel('users',this)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Users
      </div>
      <div class="admin-nav-item" onclick="switchPanel('reviews',this)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Reviews
      </div>
    </div>

    <!-- Admin Content -->
    <div class="admin-content">

      <!-- Overview Panel -->
      <div id="panel-overview" class="admin-panel active">
        <div class="panel-header">
          <h1 class="panel-title">Overview</h1>
          <button class="btn-ghost-lg" onclick="loadOverview()" style="font-size:13px;">↻ Refresh</button>
        </div>
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card"><div class="skeleton" style="height:28px;width:60px;margin-bottom:6px;"></div><div class="skeleton" style="height:12px;width:80px;"></div></div>
          <div class="stat-card"><div class="skeleton" style="height:28px;width:60px;margin-bottom:6px;"></div><div class="skeleton" style="height:12px;width:80px;"></div></div>
          <div class="stat-card"><div class="skeleton" style="height:28px;width:60px;margin-bottom:6px;"></div><div class="skeleton" style="height:12px;width:80px;"></div></div>
          <div class="stat-card"><div class="skeleton" style="height:28px;width:60px;margin-bottom:6px;"></div><div class="skeleton" style="height:12px;width:80px;"></div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="table-wrap">
            <div style="padding:14px 16px;border-bottom:1px solid var(--b1);font-family:var(--fd);font-size:13px;font-weight:700;">Papers by Department</div>
            <div id="deptBreakdown" style="padding:16px;"></div>
          </div>
          <div class="table-wrap">
            <div style="padding:14px 16px;border-bottom:1px solid var(--b1);font-family:var(--fd);font-size:13px;font-weight:700;">Papers by Status</div>
            <div id="statusBreakdown" style="padding:16px;"></div>
          </div>
        </div>
      </div>

      <!-- Papers Panel -->
      <div id="panel-papers" class="admin-panel">
        <div class="panel-header">
          <h1 class="panel-title">Papers</h1>
        </div>
        <div class="table-wrap">
          <div class="table-filters">
            <select class="filter-input" id="paperStatusFilter" onchange="loadAdminPapers(1)">
              <option value="">All statuses</option>
              <option value="submitted">Submitted</option>
              <option value="under_review">Under Review</option>
              <option value="published">Published</option>
              <option value="rejected">Rejected</option>
              <option value="revision_required">Revision Required</option>
              <option value="accepted">Accepted</option>
            </select>
            <select class="filter-input" id="paperDeptFilter" onchange="loadAdminPapers(1)">
              <option value="">All departments</option>
              <option value="cs_ai">CS / AI</option>
              <option value="space">Space</option>
              <option value="medical_bio">Medical / Bio</option>
              <option value="mechanical">Mechanical</option>
              <option value="electrical">Electrical</option>
              <option value="civil">Civil</option>
              <option value="environmental">Environmental</option>
              <option value="aerospace">Aerospace</option>
            </select>
          </div>
          <div id="papersTableWrap"></div>
          <div class="pagination" id="papersPagination"></div>
        </div>
      </div>

      <!-- Users Panel -->
      <div id="panel-users" class="admin-panel">
        <div class="panel-header">
          <h1 class="panel-title">Users</h1>
        </div>
        <div class="table-wrap">
          <div class="table-filters">
            <input type="text" class="filter-input" id="userSearch" placeholder="Search users…" oninput="debounceUserSearch()" style="flex:1;max-width:280px;"/>
            <select class="filter-input" id="userRoleFilter" onchange="loadAdminUsers(1)">
              <option value="">All roles</option>
              <option value="researcher">Researcher</option>
              <option value="reviewer">Reviewer</option>
              <option value="editor">Editor</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div id="usersTableWrap"></div>
          <div class="pagination" id="usersPagination"></div>
        </div>
      </div>

      <!-- Reviews Panel -->
      <div id="panel-reviews" class="admin-panel">
        <div class="panel-header">
          <h1 class="panel-title">Assign Reviews</h1>
        </div>
        <p style="font-size:13px;color:var(--t3);margin-bottom:20px;">Select a submitted paper and assign it to a reviewer for peer review.</p>
        <div class="table-wrap">
          <div id="reviewAssignWrap"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Assign Reviewer Modal -->
<div class="assign-modal" id="assignModal">
  <div class="assign-card">
    <h3 style="font-family:var(--fd);font-size:16px;font-weight:700;margin-bottom:6px;">Assign Reviewer</h3>
    <p id="assignPaperTitle" style="font-size:13px;color:var(--t3);margin-bottom:20px;"></p>
    <div class="form-group">
      <label class="form-label">Select Reviewer</label>
      <select class="form-select" id="reviewerSelect">
        <option value="">Loading reviewers…</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Due Date (optional)</label>
      <input type="date" class="form-input" id="reviewDueDate"/>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn-primary" onclick="submitAssignment()" id="assignBtn">Assign</button>
      <button class="btn-ghost-lg" onclick="closeAssignModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (!auth.isLoggedIn() || !auth.hasRole('admin','editor')) {
      showToast('Admin access required', 'error');
      setTimeout(() => window.location.href = '../index.html', 1500);
      return;
    }
    loadOverview();
  });

  let userSearchTimeout;

  function switchPanel(panel, el) {
    document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.admin-nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById(`panel-${panel}`).classList.add('active');
    el.classList.add('active');

    if (panel === 'papers')  loadAdminPapers(1);
    if (panel === 'users')   loadAdminUsers(1);
    if (panel === 'reviews') loadReviewAssignments();
  }

  // ── Overview ──
  async function loadOverview() {
    try {
      const data = await api.admin.stats();
      const t    = data.totals || {};

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="stat-card-num" style="color:var(--g1)">${t.totalUsers||0}</div>
          <div class="stat-card-lbl">Total Users</div>
          <div class="stat-card-sub" style="color:var(--g1)">+${data.growth?.newUsersThisMonth||0} this month</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-num" style="color:var(--p1)">${t.totalPapers||0}</div>
          <div class="stat-card-lbl">Total Papers</div>
          <div class="stat-card-sub" style="color:var(--p1)">+${data.growth?.newPapersThisMonth||0} this month</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-num" style="color:var(--am)">${t.pendingPapers||0}</div>
          <div class="stat-card-lbl">Pending Review</div>
          <div class="stat-card-sub" style="color:var(--t3)">Awaiting assignment</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-num" style="color:var(--bl)">${t.underReview||0}</div>
          <div class="stat-card-lbl">Under Review</div>
          <div class="stat-card-sub" style="color:var(--t3)">${t.publishedPapers||0} published</div>
        </div>
      `;

      const byDept = data.byDepartment || [];
      document.getElementById('deptBreakdown').innerHTML = byDept.length
        ? byDept.map(d => `
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
              <span style="width:8px;height:8px;border-radius:50%;background:${deptColor(d._id)};flex-shrink:0;"></span>
              <span style="flex:1;font-size:13px;">${deptLabel(d._id)}</span>
              <span style="font-family:var(--fm);font-size:12px;color:var(--t3);">${d.count}</span>
            </div>`).join('')
        : '<p style="color:var(--t3);font-size:13px;">No data</p>';

      const byStatus = data.byStatus || [];
      document.getElementById('statusBreakdown').innerHTML = byStatus.length
        ? byStatus.map(s => `
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
              <span class="status-badge status-${s._id}">${(s._id||'').replace(/_/g,' ')}</span>
              <span style="margin-left:auto;font-family:var(--fm);font-size:12px;color:var(--t3);">${s.count}</span>
            </div>`).join('')
        : '<p style="color:var(--t3);font-size:13px;">No data</p>';

    } catch (err) { showToast(err.message, 'error'); }
  }

  // ── Admin Papers ──
  let paperPage = 1;
  async function loadAdminPapers(page = 1) {
    paperPage = page;
    const status = document.getElementById('paperStatusFilter').value;
    const dept   = document.getElementById('paperDeptFilter').value;
    const wrap   = document.getElementById('papersTableWrap');
    wrap.innerHTML = '<div style="padding:24px;text-align:center;color:var(--t3);">Loading…</div>';

    try {
      const data = await api.admin.papers({ page, limit: 15, status, department: dept });
      const papers = data.papers || [];

      if (!papers.length) {
        wrap.innerHTML = '<div style="padding:24px;text-align:center;color:var(--t3);">No papers found</div>';
        document.getElementById('papersPagination').innerHTML = '';
        return;
      }

      wrap.innerHTML = `
        <table class="data-table">
          <thead><tr>
            <th>Title</th><th>Author</th><th>Department</th><th>Status</th><th>Date</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${papers.map(p => `
              <tr>
                <td style="max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${escapeHtml(p.title)}">${escapeHtml(p.title)}</td>
                <td>${escapeHtml(p.primaryAuthor?.name||'?')}</td>
                <td><span style="font-size:11px;color:${deptColor(p.department)};">${deptLabel(p.department)}</span></td>
                <td><span class="status-badge status-${p.status}">${(p.status||'').replace(/_/g,' ')}</span></td>
                <td style="white-space:nowrap;">${formatDate(p.createdAt)}</td>
                <td>
                  <div class="action-menu">
                    <button class="act-btn success" onclick="updatePaperStatus('${p._id}','published')">Publish</button>
                    <button class="act-btn" onclick="updatePaperStatus('${p._id}','under_review')">Review</button>
                    <button class="act-btn danger" onclick="updatePaperStatus('${p._id}','rejected')">Reject</button>
                    <button class="act-btn" onclick="openAssignModal('${p._id}','${escapeHtml(p.title)}')">Assign</button>
                  </div>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>`;

      const pg = data.pagination;
      document.getElementById('papersPagination').innerHTML = pg ? `
        <span>Showing ${(pg.page-1)*pg.limit+1}–${Math.min(pg.page*pg.limit,pg.total)} of ${pg.total}</span>
        <div style="display:flex;gap:6px;">
          <button class="page-btn" onclick="loadAdminPapers(${pg.page-1})" ${pg.page<=1?'disabled':''}>← Prev</button>
          <button class="page-btn" onclick="loadAdminPapers(${pg.page+1})" ${pg.page>=pg.pages?'disabled':''}>Next →</button>
        </div>` : '';
    } catch (err) {
      wrap.innerHTML = `<div style="padding:24px;text-align:center;color:var(--pk);">${err.message}</div>`;
    }
  }

  async function updatePaperStatus(id, status) {
    if (!confirm(`Set status to "${status}"?`)) return;
    try {
      await api.admin.updatePaperStatus(id, status);
      showToast('Status updated', 'success');
      loadAdminPapers(paperPage);
    } catch (err) { showToast(err.message, 'error'); }
  }

  // ── Admin Users ──
  let userPage = 1;
  function debounceUserSearch() {
    clearTimeout(userSearchTimeout);
    userSearchTimeout = setTimeout(() => loadAdminUsers(1), 400);
  }

  async function loadAdminUsers(page = 1) {
    userPage = page;
    const search = document.getElementById('userSearch').value.trim();
    const role   = document.getElementById('userRoleFilter').value;
    const wrap   = document.getElementById('usersTableWrap');
    wrap.innerHTML = '<div style="padding:24px;text-align:center;color:var(--t3);">Loading…</div>';

    try {
      const data  = await api.admin.users({ page, limit: 15, search, role });
      const users = data.users || [];

      if (!users.length) {
        wrap.innerHTML = '<div style="padding:24px;text-align:center;color:var(--t3);">No users found</div>';
        document.getElementById('usersPagination').innerHTML = '';
        return;
      }

      wrap.innerHTML = `
        <table class="data-table">
          <thead><tr>
            <th>Name</th><th>Email</th><th>Role</th><th>Verified</th><th>Active</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${users.map(u => `
              <tr>
                <td>${escapeHtml(u.name)}</td>
                <td style="color:var(--t3);">${escapeHtml(u.email)}</td>
                <td><span class="status-badge" style="background:rgba(0,255,178,0.08);color:var(--g1);">${u.role}</span></td>
                <td>${u.isVerified ? '<span style="color:var(--g1);">✓</span>' : '<span style="color:var(--pk);">✕</span>'}</td>
                <td>${u.isActive ? '<span style="color:var(--g1);">Active</span>' : '<span style="color:var(--pk);">Inactive</span>'}</td>
                <td>
                  <div class="action-menu">
                    <select class="filter-input" style="font-size:11px;padding:3px 6px;" onchange="changeUserRole('${u._id}',this.value)">
                      <option value="">Change role…</option>
                      <option value="researcher">Researcher</option>
                      <option value="reviewer">Reviewer</option>
                      <option value="editor">Editor</option>
                      <option value="admin">Admin</option>
                    </select>
                    <button class="act-btn ${u.isActive?'danger':'success'}" onclick="toggleUserActive('${u._id}',${!u.isActive})">
                      ${u.isActive ? 'Deactivate' : 'Activate'}
                    </button>
                  </div>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>`;

      const pg = data.pagination;
      document.getElementById('usersPagination').innerHTML = pg ? `
        <span>Showing ${(pg.page-1)*pg.limit+1}–${Math.min(pg.page*pg.limit,pg.total)} of ${pg.total}</span>
        <div style="display:flex;gap:6px;">
          <button class="page-btn" onclick="loadAdminUsers(${pg.page-1})" ${pg.page<=1?'disabled':''}>← Prev</button>
          <button class="page-btn" onclick="loadAdminUsers(${pg.page+1})" ${pg.page>=pg.pages?'disabled':''}>Next →</button>
        </div>` : '';
    } catch (err) {
      wrap.innerHTML = `<div style="padding:24px;text-align:center;color:var(--pk);">${err.message}</div>`;
    }
  }

  async function changeUserRole(id, role) {
    if (!role) return;
    if (!confirm(`Change role to "${role}"?`)) return;
    try {
      await api.admin.updateUser(id, { role });
      showToast('Role updated', 'success');
      loadAdminUsers(userPage);
    } catch (err) { showToast(err.message, 'error'); }
  }

  async function toggleUserActive(id, isActive) {
    if (!confirm(`${isActive ? 'Activate' : 'Deactivate'} this user?`)) return;
    try {
      await api.admin.updateUser(id, { isActive });
      showToast(`User ${isActive ? 'activated' : 'deactivated'}`, 'success');
      loadAdminUsers(userPage);
    } catch (err) { showToast(err.message, 'error'); }
  }

  // ── Review Assignments ──
  async function loadReviewAssignments() {
    const wrap = document.getElementById('reviewAssignWrap');
    wrap.innerHTML = '<div style="padding:24px;text-align:center;color:var(--t3);">Loading…</div>';
    try {
      const data   = await api.admin.papers({ status: 'submitted', limit: 20 });
      const papers = data.papers || [];
      if (!papers.length) {
        wrap.innerHTML = '<div style="padding:24px;text-align:center;color:var(--t3);">No papers awaiting review assignment</div>';
        return;
      }
      wrap.innerHTML = `
        <table class="data-table">
          <thead><tr><th>Title</th><th>Author</th><th>Department</th><th>Submitted</th><th>Action</th></tr></thead>
          <tbody>
            ${papers.map(p => `
              <tr>
                <td style="max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${escapeHtml(p.title)}">${escapeHtml(p.title)}</td>
                <td>${escapeHtml(p.primaryAuthor?.name||'?')}</td>
                <td><span style="color:${deptColor(p.department)};font-size:11px;">${deptLabel(p.department)}</span></td>
                <td>${formatDate(p.createdAt)}</td>
                <td><button class="act-btn success" onclick="openAssignModal('${p._id}','${escapeHtml(p.title)}')">Assign Reviewer</button></td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    } catch (err) {
      wrap.innerHTML = `<div style="padding:24px;text-align:center;color:var(--pk);">${err.message}</div>`;
    }
  }

  let assignPaperId = null;
  async function openAssignModal(paperId, title) {
    assignPaperId = paperId;
    document.getElementById('assignPaperTitle').textContent = title;
    document.getElementById('assignModal').classList.add('open');

    const sel = document.getElementById('reviewerSelect');
    sel.innerHTML = '<option value="">Loading…</option>';
    try {
      const { reviewers } = await api.admin.reviewers();
      if (!reviewers?.length) {
        sel.innerHTML = '<option value="">No reviewers available</option>';
        return;
      }
      sel.innerHTML = '<option value="">Select a reviewer…</option>' +
        reviewers.map(r => `<option value="${r._id}">${escapeHtml(r.name)} — ${escapeHtml(r.institution||r.department||'')}</option>`).join('');
    } catch (err) {
      sel.innerHTML = '<option value="">Error loading reviewers</option>';
    }
  }

  function closeAssignModal() {
    document.getElementById('assignModal').classList.remove('open');
    assignPaperId = null;
  }

  async function submitAssignment() {
    const reviewerId = document.getElementById('reviewerSelect').value;
    const dueDate    = document.getElementById('reviewDueDate').value;
    if (!reviewerId) { showToast('Please select a reviewer', 'warning'); return; }

    const btn = document.getElementById('assignBtn');
    btn.disabled = true;
    btn.textContent = 'Assigning…';

    try {
      await api.reviews.assign({ paperId: assignPaperId, reviewerId, dueDate: dueDate || undefined });
      showToast('Reviewer assigned successfully', 'success');
      closeAssignModal();
      loadReviewAssignments();
    } catch (err) {
      showToast(err.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Assign';
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
</script>
</body>
</html>
