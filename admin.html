<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create Account — MANI Research</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@400;700;800;900&display=swap');
:root{--void:#03040A;--surface:#0A0D18;--raised:#0E1220;--g1:#00FFB2;--g2:#00D4FF;--p1:#9B6DFF;--pk:#FF6B9D;--am:#FFBE0B;--bl:#60C8FF;--t1:#F0F2FA;--t2:#8B96B0;--t3:#3D4A6B;--ti:#03040A;--b1:rgba(255,255,255,0.04);--b2:rgba(255,255,255,0.08);--b3:rgba(255,255,255,0.14);--fd:'Outfit',sans-serif;--fb:'Space Grotesk',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fb);background:var(--void);color:var(--t1);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 20px;-webkit-font-smoothing:antialiased;position:relative;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 60% at 80% 0%,rgba(155,109,255,0.07) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 20% 100%,rgba(0,255,178,0.06) 0%,transparent 55%);}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--raised);}

.wrap{position:relative;z-index:1;width:100%;max-width:500px;animation:up .4s cubic-bezier(0.16,1,0.3,1);}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

.brand{text-align:center;margin-bottom:24px;}
.logo-ring{width:48px;height:48px;border-radius:50%;background:radial-gradient(circle,rgba(0,255,178,0.2),rgba(0,255,178,0.05));border:1.5px solid rgba(0,255,178,0.4);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;box-shadow:0 0 24px rgba(0,255,178,0.12);}
.brand-n{font-family:var(--fd);font-size:20px;font-weight:900;letter-spacing:.06em;background:linear-gradient(135deg,#fff,var(--g1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;line-height:1;}
.brand-s{font-size:10px;color:var(--t3);letter-spacing:.08em;display:block;margin-top:2px;}

.card{background:rgba(14,18,32,0.9);border:1px solid var(--b3);border-radius:20px;padding:32px;backdrop-filter:blur(20px);}
.card-title{font-family:var(--fd);font-size:20px;font-weight:800;margin-bottom:4px;}
.card-sub{font-size:13px;color:var(--t3);margin-bottom:24px;}

.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.fl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);}
.fi,.fs{background:rgba(3,4,10,0.7);border:1px solid var(--b2);border-radius:10px;padding:10px 13px;color:var(--t1);font-family:var(--fb);font-size:13px;outline:none;width:100%;transition:border-color .2s,box-shadow .2s;}
.fi:focus,.fs:focus{border-color:rgba(0,255,178,0.45);box-shadow:0 0 0 3px rgba(0,255,178,0.06);}
.fi::placeholder{color:var(--t3);}
.fs option{background:var(--surface);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* Role cards */
.roles{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.role-c{border:1px solid var(--b2);border-radius:12px;padding:11px 13px;cursor:pointer;transition:all .2s;position:relative;}
.role-c:hover{border-color:var(--b3);}
.role-c.on{border-color:rgba(0,255,178,0.4);background:rgba(0,255,178,0.05);}
.role-c input{position:absolute;opacity:0;pointer-events:none;}
.role-t{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:2px;}
.role-d{font-size:11px;color:var(--t3);}
.role-ic{font-size:18px;margin-bottom:5px;}

/* Password strength */
.pw-bars{display:flex;gap:4px;margin-top:6px;}
.pw-bar{flex:1;height:3px;border-radius:2px;background:var(--b1);transition:background .3s;}
.pw-bar.w{background:var(--pk);}
.pw-bar.f{background:var(--am);}
.pw-bar.g{background:var(--bl);}
.pw-bar.s{background:var(--g1);}
.pw-label{font-size:11px;margin-top:4px;transition:color .3s;}

.btn-main{width:100%;background:linear-gradient(135deg,var(--g1),var(--g2));color:var(--ti);border:none;border-radius:999px;padding:12px;font-family:var(--fb);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 0 20px rgba(0,255,178,0.18);margin-top:6px;}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(0,255,178,0.28);}
.btn-main:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.switch{text-align:center;font-size:13px;color:var(--t3);margin-top:18px;}
.switch a{color:var(--g1);font-weight:600;}
.err{background:rgba(255,107,157,0.1);border:1px solid rgba(255,107,157,0.3);color:var(--pk);font-size:13px;padding:11px 14px;border-radius:10px;margin-bottom:14px;display:none;}
.ok{background:rgba(0,255,178,0.08);border:1px solid rgba(0,255,178,0.25);color:var(--g1);font-size:13px;padding:16px 14px;border-radius:10px;margin-bottom:14px;display:none;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="logo-ring">
      <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="14" stroke="#00FFB2" stroke-width="1.5"/>
        <circle cx="16" cy="16" r="3.5" fill="#00FFB2"/>
        <line x1="16" y1="2" x2="16" y2="9" stroke="#00FFB2" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="16" y1="23" x2="16" y2="30" stroke="#00FFB2" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="2" y1="16" x2="9" y2="16" stroke="#00FFB2" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="23" y1="16" x2="30" y2="16" stroke="#00FFB2" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="brand-n">MANI</span>
    <span class="brand-s">Multidisciplinary Advanced Network for Innovation</span>
  </div>

  <div class="card">
    <h2 class="card-title">Create your account</h2>
    <p class="card-sub">Join the global research network — free forever</p>

    <div class="err" id="err"></div>
    <div class="ok"  id="ok"></div>

    <div id="formWrap">
      <form onsubmit="doSignup(event)">
        <div class="fg">
          <label class="fl">Full name</label>
          <input class="fi" type="text" id="name" placeholder="Dr. Jane Smith" required maxlength="100"/>
        </div>
        <div class="fg">
          <label class="fl">Email address</label>
          <input class="fi" type="email" id="email" placeholder="you@university.edu" required/>
        </div>
        <div class="row2">
          <div class="fg">
            <label class="fl">Institution</label>
            <input class="fi" type="text" id="institution" placeholder="MIT, IIT Bombay…"/>
          </div>
          <div class="fg">
            <label class="fl">Department</label>
            <select class="fs" id="dept">
              <option value="">Select…</option>
              <option value="cs_ai">CS / AI</option>
              <option value="space">Space Research</option>
              <option value="medical_bio">Medical / Bio</option>
              <option value="mechanical">Mechanical</option>
              <option value="electrical">Electrical</option>
              <option value="civil">Civil</option>
              <option value="environmental">Environmental</option>
              <option value="aerospace">Aerospace</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <div class="fg">
          <label class="fl">I am a…</label>
          <div class="roles">
            <label class="role-c on" onclick="setRole(this,'researcher')">
              <input type="radio" name="role" value="researcher" checked/>
              <div class="role-ic">🔬</div>
              <div class="role-t">Researcher</div>
              <div class="role-d">Publish &amp; discover papers</div>
            </label>
            <label class="role-c" onclick="setRole(this,'reviewer')">
              <input type="radio" name="role" value="reviewer"/>
              <div class="role-ic">📝</div>
              <div class="role-t">Reviewer</div>
              <div class="role-d">Peer-review submissions</div>
            </label>
          </div>
        </div>

        <div class="fg">
          <label class="fl">Password</label>
          <input class="fi" type="password" id="password" placeholder="Min 8 chars, 1 uppercase, 1 number" required oninput="checkPw(this.value)"/>
          <div class="pw-bars">
            <div class="pw-bar" id="pb1"></div>
            <div class="pw-bar" id="pb2"></div>
            <div class="pw-bar" id="pb3"></div>
            <div class="pw-bar" id="pb4"></div>
          </div>
          <div class="pw-label" id="pwLbl" style="color:var(--t3);">Enter a password</div>
        </div>
        <div class="fg">
          <label class="fl">Confirm password</label>
          <input class="fi" type="password" id="confirm" placeholder="Re-enter password" required/>
        </div>

        <button class="btn-main" type="submit" id="btn">Create Account</button>
      </form>
    </div>

    <div class="switch">Already have an account? <a href="login.html">Sign in →</a></div>
  </div>
</div>

<script>
const API = 'http://localhost:5000/api';
if (localStorage.getItem('mani_token')) location.href = '../index.html';

let selectedRole = 'researcher';
function setRole(el, role) {
  document.querySelectorAll('.role-c').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  selectedRole = role;
}

function checkPw(pw) {
  let sc = 0;
  if (pw.length >= 8) sc++;
  if (/[A-Z]/.test(pw)) sc++;
  if (/[0-9]/.test(pw)) sc++;
  if (/[^A-Za-z0-9]/.test(pw)) sc++;
  const cls = ['','w','f','g','s'];
  const lbl = ['','Weak','Fair','Good','Strong'];
  const col = ['var(--t3)','var(--pk)','var(--am)','var(--bl)','var(--g1)'];
  for (let i=1;i<=4;i++) {
    const b = document.getElementById(`pb${i}`);
    b.className = 'pw-bar ' + (i<=sc ? cls[sc] : '');
  }
  const l = document.getElementById('pwLbl');
  l.textContent = lbl[sc] || 'Enter a password';
  l.style.color = col[sc];
}

async function doSignup(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  const ok  = document.getElementById('ok');
  err.style.display='none'; ok.style.display='none';

  const pw  = document.getElementById('password').value;
  const pw2 = document.getElementById('confirm').value;
  if (pw !== pw2) { err.textContent='Passwords do not match.'; err.style.display='block'; return; }

  btn.disabled=true; btn.textContent='Creating account…';
  try {
    const r = await fetch(API+'/auth/signup', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name:        document.getElementById('name').value.trim(),
        email:       document.getElementById('email').value.trim(),
        password:    pw,
        role:        selectedRole,
        institution: document.getElementById('institution').value.trim(),
        department:  document.getElementById('dept').value
      })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || d.errors?.[0]?.msg || 'Signup failed');
    document.getElementById('formWrap').style.display='none';
    ok.innerHTML = '✓ Account created!<br/>Check your email to verify your address before signing in.';
    ok.style.display='block';
  } catch(ex) {
    err.textContent=ex.message; err.style.display='block';
    btn.disabled=false; btn.textContent='Create Account';
  }
}
</script>
</body>
</html>
