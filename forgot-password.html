<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Review Panel — MANI Research</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@400;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--void:#03040A;--deep:#06080F;--surface:#0A0D18;--raised:#0E1220;--hover:#131728;--card:#0C1020;--g1:#00FFB2;--g2:#00D4FF;--p1:#9B6DFF;--pk:#FF6B9D;--am:#FFBE0B;--bl:#60C8FF;--t1:#F0F2FA;--t2:#8B96B0;--t3:#3D4A6B;--ti:#03040A;--b1:rgba(255,255,255,0.04);--b2:rgba(255,255,255,0.08);--b3:rgba(255,255,255,0.14);--b4:rgba(255,255,255,0.22);--fd:'Outfit',sans-serif;--fb:'Space Grotesk',sans-serif;--fm:'JetBrains Mono',monospace;--nav:62px;--sb:218px;--rp:276px;--r1:6px;--r2:10px;--r3:14px;--r4:20px;--r5:28px;}

    .review-layout { max-width:960px; margin:0 auto; padding:40px 24px; position:relative; z-index:1; }
    .review-list { display:flex; flex-direction:column; gap:14px; }
    .review-card { background:var(--raised); border:1px solid var(--b2); border-radius:var(--r3); padding:22px; transition:border-color 0.2s; }
    .review-card:hover { border-color:var(--b3); }
    .review-card-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:12px; }
    .review-paper-title { font-family:var(--fd); font-size:16px; font-weight:700; margin-bottom:6px; }
    .review-meta { font-size:12px; color:var(--t3); display:flex; gap:12px; flex-wrap:wrap; }
    .expand-btn { background:none; border:1px solid var(--b2); color:var(--t2); padding:6px 14px; border-radius:var(--r2); cursor:pointer; font-size:13px; transition:all 0.15s; white-space:nowrap; }
    .expand-btn:hover { border-color:var(--g1); color:var(--g1); }
    .review-form { display:none; margin-top:20px; padding-top:20px; border-top:1px solid var(--b1); animation:fadeIn 0.2s; }
    .review-form.open { display:block; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .scores-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; margin-bottom:20px; }
    .score-item { background:var(--card); border:1px solid var(--b1); border-radius:var(--r2); padding:14px; }
    .score-label { font-size:11px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:var(--t3); margin-bottom:8px; }
    .score-input { width:100%; -webkit-appearance:none; appearance:none; height:4px; border-radius:2px; background:var(--b2); outline:none; cursor:pointer; }
    .score-input::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--g1); cursor:pointer; border:2px solid var(--void); }
    .score-value { font-family:var(--fm); font-size:20px; font-weight:700; color:var(--g1); margin-top:6px; }
    .rec-options { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
    .rec-option { border:1px solid var(--b2); border-radius:var(--r2); padding:8px 14px; cursor:pointer; font-size:13px; color:var(--t2); transition:all 0.15s; }
    .rec-option:hover { border-color:var(--g1); color:var(--g1); }
    .rec-option.selected.accept   { border-color:var(--g1); background:rgba(0,255,178,0.08); color:var(--g1); }
    .rec-option.selected.reject   { border-color:var(--pk); background:rgba(255,107,157,0.1); color:var(--pk); }
    .rec-option.selected.minor    { border-color:var(--am); background:rgba(255,215,0,0.1); color:var(--am); }
    .rec-option.selected.major    { border-color:var(--bl); background:rgba(79,195,247,0.1); color:var(--bl); }
    .review-actions { display:flex; gap:10px; margin-top:16px; }
    .save-draft-btn { background:none; border:1px solid var(--b2); color:var(--t2); padding:9px 18px; border-radius:var(--r3); font-size:13px; cursor:pointer; transition:all 0.15s; }
    .save-draft-btn:hover { border-color:var(--g1); color:var(--g1); }
    .submit-review-btn { background:var(--g1); color:var(--ti); border:none; padding:10px 22px; border-radius:var(--r3); font-size:13px; font-weight:600; cursor:pointer; transition:opacity 0.15s; }
    .submit-review-btn:hover { opacity:0.9; }
    .submit-review-btn:disabled { opacity:0.5; cursor:not-allowed; }
  
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 10% -10%,rgba(0,255,178,0.05) 0%,transparent 55%),radial-gradient(ellipse 60% 50% at 90% 110%,rgba(155,109,255,0.06) 0%,transparent 55%);}

</style>
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="nav-brand">
    <div class="logo-mark">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="14" stroke="#4FFFB0" stroke-width="1.5"/>
        <circle cx="16" cy="16" r="3" fill="#4FFFB0"/>
        <line x1="16" y1="2" x2="16" y2="8" stroke="#4FFFB0" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="16" y1="24" x2="16" y2="30" stroke="#4FFFB0" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="2" y1="16" x2="8" y2="16" stroke="#4FFFB0" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="24" y1="16" x2="30" y2="16" stroke="#4FFFB0" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="brand-text">
      <span class="brand-name">MANI</span>
      <span class="brand-tagline">Review Panel</span>
    </div>
  </a>
  <div class="nav-actions" style="margin-left:auto;">
    <a href="../index.html" class="btn-ghost-lg" style="font-size:13px;">← Back</a>
  </div>
</nav>

<div class="review-layout" style="padding-top:calc(var(--nav)+40px);">
  <div style="margin-bottom:28px;">
    <h1 style="font-family:var(--fd);font-size:26px;font-weight:800;margin-bottom:6px;">Review Panel</h1>
    <p style="font-size:14px;color:var(--t3);">Papers assigned to you for peer review</p>
  </div>
  <div id="reviewList">
    <div style="text-align:center;padding:48px;color:var(--t3);">Loading…</div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (!auth.requireAuth()) return;
    loadMyReviews();
  });

  async function loadMyReviews() {
    const list = document.getElementById('reviewList');
    try {
      const { reviews } = await api.reviews.my();
      if (!reviews?.length) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <div class="empty-title">No reviews assigned</div>
            <p class="empty-sub">You have no papers to review at the moment.</p>
          </div>`;
        return;
      }
      list.innerHTML = reviews.map(r => renderReviewCard(r)).join('');
      // Init sliders
      document.querySelectorAll('.score-input').forEach(inp => {
        inp.addEventListener('input', function() {
          document.getElementById(`val-${this.dataset.key}-${this.dataset.rid}`).textContent = this.value;
        });
      });
    } catch (err) {
      list.innerHTML = `<div style="color:var(--pk);text-align:center;padding:32px;">${err.message}</div>`;
    }
  }

  function renderReviewCard(r) {
    const paper   = r.paper || {};
    const color   = deptColor(paper.department);
    const isDone  = r.status === 'submitted';

    return `
      <div class="review-card" id="rc-${r._id}">
        <div class="review-card-header">
          <div style="flex:1;min-width:0;">
            <span class="dept-pill" style="color:${color};border-color:${color}33;background:${color}11;margin-bottom:8px;display:inline-flex;">${deptLabel(paper.department)}</span>
            <div class="review-paper-title">${escapeHtml(paper.title||'Untitled')}</div>
            <div class="review-meta">
              <span>Status: <strong style="color:${isDone?'var(--g1)':'var(--am)'};">${r.status}</strong></span>
              ${r.dueDate ? `<span>Due: ${formatDate(r.dueDate)}</span>` : ''}
              ${r.overallScore ? `<span>Score: ${r.overallScore}/10</span>` : ''}
            </div>
          </div>
          ${!isDone ? `<button class="expand-btn" onclick="toggleReviewForm('${r._id}')">Write Review</button>` : `<span class="status-badge status-published">Submitted</span>`}
        </div>

        ${paper.abstract ? `<p style="font-size:13px;color:var(--t3);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;">${escapeHtml(paper.abstract)}</p>` : ''}

        ${!isDone ? `
        <div class="review-form" id="rf-${r._id}">
          <h3 style="font-size:13px;font-weight:700;margin-bottom:14px;color:var(--t2);">Evaluation Scores (1–10)</h3>
          <div class="scores-grid">
            ${['originality','methodology','clarity','significance','references'].map(key => `
              <div class="score-item">
                <div class="score-label">${key}</div>
                <input type="range" class="score-input" min="1" max="10" value="${r.scores?.[key]||5}" data-key="${key}" data-rid="${r._id}"/>
                <div class="score-value" id="val-${key}-${r._id}">${r.scores?.[key]||5}</div>
              </div>`).join('')}
          </div>

          <h3 style="font-size:13px;font-weight:700;margin-bottom:10px;color:var(--t2);">Recommendation</h3>
          <div class="rec-options" id="rec-${r._id}">
            ${[
              {val:'accept',      label:'Accept',           cls:'accept'},
              {val:'minor_revision', label:'Minor Revision', cls:'minor'},
              {val:'major_revision', label:'Major Revision', cls:'major'},
              {val:'reject',      label:'Reject',           cls:'reject'}
            ].map(o => `
              <div class="rec-option ${o.cls} ${(r.recommendation||''===o.val)?'selected':''}" onclick="selectRec('${r._id}','${o.val}',this,'${o.cls}')">${o.label}</div>`
            ).join('')}
          </div>

          <div class="form-group">
            <label class="form-label">Summary of the Paper</label>
            <textarea class="form-textarea" id="summary-${r._id}" placeholder="Briefly summarise what the paper is about…" style="min-height:90px;">${r.summary||''}</textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Strengths</label>
            <textarea class="form-textarea" id="strengths-${r._id}" placeholder="What are the key strengths of this work?" style="min-height:80px;">${r.strengthsComments||''}</textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Weaknesses & Suggestions</label>
            <textarea class="form-textarea" id="weaknesses-${r._id}" placeholder="What needs improvement?" style="min-height:80px;">${r.weaknessesComments||''}</textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Private Comments to Editor <span style="color:var(--t3);font-weight:400;">(not shown to author)</span></label>
            <textarea class="form-textarea" id="private-${r._id}" placeholder="Confidential notes for the editor…" style="min-height:70px;">${r.privateComments||''}</textarea>
          </div>
          <div class="review-actions">
            <button class="save-draft-btn" onclick="saveReview('${r._id}',false)">Save Draft</button>
            <button class="submit-review-btn" onclick="saveReview('${r._id}',true)" id="sbtn-${r._id}">Submit Review</button>
          </div>
        </div>` : ''}
      </div>`;
  }

  const selectedRecs = {};

  function selectRec(rid, val, el, cls) {
    selectedRecs[rid] = val;
    document.querySelectorAll(`#rec-${rid} .rec-option`).forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
  }

  function toggleReviewForm(rid) {
    const form = document.getElementById(`rf-${rid}`);
    form.classList.toggle('open');
  }

  async function saveReview(rid, submit) {
    const btn = document.getElementById(`sbtn-${rid}`);
    if (btn) { btn.disabled = true; btn.textContent = submit ? 'Submitting…' : 'Saving…'; }

    const getScore = key => {
      const el = document.querySelector(`[data-key="${key}"][data-rid="${rid}"]`);
      return el ? parseInt(el.value) : undefined;
    };

    const payload = {
      scores: {
        originality:  getScore('originality'),
        methodology:  getScore('methodology'),
        clarity:      getScore('clarity'),
        significance: getScore('significance'),
        references:   getScore('references')
      },
      summary:             document.getElementById(`summary-${rid}`)?.value?.trim()   || '',
      strengthsComments:   document.getElementById(`strengths-${rid}`)?.value?.trim() || '',
      weaknessesComments:  document.getElementById(`weaknesses-${rid}`)?.value?.trim() || '',
      privateComments:     document.getElementById(`private-${rid}`)?.value?.trim()   || '',
      recommendation:      selectedRecs[rid] || '',
      submit
    };

    try {
      await api.reviews.update(rid, payload);
      showToast(submit ? 'Review submitted successfully!' : 'Draft saved', 'success');
      if (submit) loadMyReviews();
      else {
        if (btn) { btn.disabled = false; btn.textContent = 'Submit Review'; }
      }
    } catch (err) {
      showToast(err.message, 'error');
      if (btn) { btn.disabled = false; btn.textContent = 'Submit Review'; }
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
</script>
</body>
</html>
